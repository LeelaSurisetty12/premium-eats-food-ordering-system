<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Premium Eats</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Review your cart">
</head>
<body>

    <header>
        <h1>Premium Eats</h1>
        <a href="dashboard.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Menu
        </a>
    </header>

    <div class="cart-container glass-panel">
        <h1>Your Cart 🛒</h1>
        
        <ul id="cartList"></ul>
        <h2 id="total">Total: ₹0</h2>
        
        <button onclick="placeOrder()">Place Order Securely</button>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <div class="glass-panel" style="padding: 40px; max-width: 500px; width: 90%; text-align: center; animation: fadeIn 0.3s ease-out;">
            <h2 style="margin-bottom: 20px;">Review Your Order</h2>
            <div id="modalSummary" style="margin: 20px 0; text-align: left; max-height: 250px; overflow-y: auto; color: var(--text-main); font-size: 16px; border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border); padding: 15px 0;"></div>
            <h3 id="modalTotal" style="margin-bottom: 30px; font-size: 24px; color: #92FE9D;">Total: ₹0</h3>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button onclick="document.getElementById('confirmModal').style.display='none'" style="background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white;">Cancel</button>
                <button onclick="submitOrderConfirmed()" style="background: var(--primary-gradient);">Confirm Purchase</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>

</body>
</html>
