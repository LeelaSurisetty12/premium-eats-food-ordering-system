<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Premium Eats</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Login to Premium Eats">
</head>
<body class="login-body">

    <div class="login-box glass-panel">
        <h2>Welcome Back 👋</h2>
        
        <input type="text" id="username" placeholder="Enter Username (admin)">
        <input type="password" id="password" placeholder="Enter Password (1234)">
        
        <button onclick="login()">Login to Dashboard</button>
        
        <button onclick="googleLogin()" style="background: var(--glass-bg); color: white; border: 1px solid var(--glass-border); margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.345-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z"/></svg> Continue with Google
        </button>

        <p style="margin-top: 20px; font-size: 14px;">Don't have an account? <a href="register.html" style="color: #92FE9D; text-decoration: none;">Sign up here</a></p>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>

</body>
</html>
