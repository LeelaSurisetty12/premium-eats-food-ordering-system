<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Premium Eats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-box glass-panel">
        <h2>Create Account 🚀</h2>
        
        <input type="text" id="reg-username" placeholder="Choose a Username">
        <input type="password" id="reg-password" placeholder="Choose a Password">
        
        <button onclick="register()">Sign Up secure</button>
        <p style="margin-top: 20px; font-size: 14px;">Already have an account? <a href="login.html" style="color: #92FE9D; text-decoration: none;">Log in</a></p>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>

</body>
</html>
